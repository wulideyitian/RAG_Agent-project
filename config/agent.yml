external_data_path: data/external/records.csv
fault_cases_path: data/fault_cases.md
laptop_specs_path: data/laptop_specs.csv

# 上下文管理配置
context_config:
  max_tokens: 6000          # 最大 token 限制
  window_size: 10           # 滑动窗口大小(轮数)
  min_keep_turns: 5         # 最少保留轮数
  strategy: "hybrid"        # 策略: token_budget | window_size | hybrid
  model_encoding: "cl100k_base"  # tiktoken encoding 名称
