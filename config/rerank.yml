# Reranker 配置
enabled: true                    # 是否启用重排序
model_name: BAAI/bge-reranker-base  # HuggingFace 模型名称
top_n: 5                         # 重排序后返回的文档数量
initial_k: 10                    # 初始召回数量（重排序前的候选文档数）
batch_size: 32                   # 批处理大小
device: auto                     # 运行设备 (cpu/cuda/auto)
timeout: 30                      # 重排序超时时间（秒）
